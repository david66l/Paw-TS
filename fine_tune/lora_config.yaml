# LoRA 微调配置 — 验证轮 (30条, 1 epoch, 10 min)
# 用于快速验证格式兼容性和训练方向

### model
model_name_or_path: /root/autodl-tmp/qwen3-14b-awq
template: qwen

### dataset
dataset: paw_validation
dataset_dir: .
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 2

### training
output_dir: ./qwen3-paw-lora-validation
do_train: true
finetuning_type: lora
lora_rank: 16              # 验证轮用小 rank
lora_alpha: 32
lora_target: all
lora_dropout: 0.05

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1e-4
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.1
logging_steps: 5
save_steps: 100
plot_loss: true

bf16: true
gradient_checkpointing: true
max_grad_norm: 1.0

### generation (for testing)
max_new_tokens: 512
temperature: 0.2
do_sample: true
