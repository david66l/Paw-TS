name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint, typecheck, and test
        run: bun run check:ts

      - name: Memory cutover gate
        run: bash scripts/check-memory-cutover.sh

  memory-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: paw
          POSTGRES_PASSWORD: paw
          POSTGRES_DB: paw_memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paw -d paw_memory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://paw:paw@localhost:5432/paw_memory_test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply memory migrations
        run: bun run memory:migrate

      - name: Memory Runtime + health + legacy migrate tests
        run: |
          bun test packages/memory/test/health.test.ts
          bun test packages/memory/test/runtime.e2e.test.ts
          bun test packages/memory/test/migrate-legacy.test.ts
          bun test packages/agent/test/memory-runtime-cutover.test.ts
